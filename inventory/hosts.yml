---
all:
  vars:
    ansible_python_interpreter: /usr/bin/python3

  children:
    linux_servers:
      hosts:
        ubuntu-server-01:
          ansible_host: 10.10.20.11
          ansible_user: ansible
          ansible_ssh_private_key_file: ~/.ssh/ansible_key
        ubuntu-server-02:
          ansible_host: 10.10.20.12
          ansible_user: ansible
          ansible_ssh_private_key_file: ~/.ssh/ansible_key

    windows_workstations:
      vars:
        # ntlm works for local accounts in a home lab without Active Directory
        # switch to kerberos if you add a domain controller later
        ansible_winrm_transport: ntlm
        ansible_winrm_server_cert_validation: ignore
        ansible_port: 5985
        ansible_connection: winrm
      hosts:
        win10-workstation-01:
          ansible_host: 10.10.10.21
          ansible_user: Administrator
        win10-workstation-02:
          ansible_host: 10.10.10.22
          ansible_user: Administrator

    cisco_devices:
      vars:
        ansible_network_os: cisco.ios.ios
        ansible_connection: network_cli
        ansible_user: admin
        ansible_ssh_private_key_file: ~/.ssh/ansible_key
      hosts:
        SW-DIST:
          ansible_host: 10.10.99.1
        SW-ACC-1:
          ansible_host: 10.10.99.11
        SW-ACC-2:
          ansible_host: 10.10.99.12
        R1-CORE:
          ansible_host: 10.0.1.1
