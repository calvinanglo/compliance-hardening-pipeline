---
# Compliance Report Aggregator
# Runs all audits and generates a unified HTML + JSON report
# Run: ansible-playbook compliance-report.yml -i inventory/hosts.yml

- name: Aggregate compliance results and generate report
  hosts: localhost
    gather_facts: yes

      vars:
          report_dir: "./reports"
              timestamp: "{{ ansible_date_time.date }}"
                  report_file: "{{ report_dir }}/compliance-summary-{{ timestamp }}.html"
                      json_report: "{{ report_dir }}/compliance-summary-{{ timestamp }}.json"

                        tasks:

                            - name: Create reports directory
                                  file:
                                          path: "{{ report_dir }}"
                                                  state: directory

                                                      - name: Run Cisco audit playbook
                                                            command: >
                                                                    ansible-playbook playbooks/cisco-audit.yml
                                                                            -i inventory/hosts.yml
                                                                                    -e "report_dir={{ report_dir }}"
                                                                                          register: cisco_audit_result
                                                                                                ignore_errors: yes

                                                                                                    - name: Run Linux hardening in check mode (audit only)
                                                                                                          command: >
                                                                                                                  ansible-playbook playbooks/linux-hardening.yml
                                                                                                                          -i inventory/hosts.yml
                                                                                                                                  --check
                                                                                                                                          --diff
                                                                                                                                                register: linux_audit_result
                                                                                                                                                      ignore_errors: yes
                                                                                                                                                      
                                                                                                                                                          - name: Run Windows hardening in check mode (audit only)
                                                                                                                                                                command: >
                                                                                                                                                                        ansible-playbook playbooks/windows-hardening.yml
                                                                                                                                                                                -i inventory/hosts.yml
                                                                                                                                                                                        --check
                                                                                                                                                                                                --diff
                                                                                                                                                                                                      register: windows_audit_result
                                                                                                                                                                                                            ignore_errors: yes
                                                                                                                                                                                                            
                                                                                                                                                                                                                - name: Build compliance summary data
                                                                                                                                                                                                                      set_fact:
                                                                                                                                                                                                                              compliance_data:
                                                                                                                                                                                                                                        timestamp: "{{ ansible_date_time.iso8601 }}"
                                                                                                                                                                                                                                                  environment: "production"
                                                                                                                                                                                                                                                            report_generated_by: "ansible-compliance-pipeline"
                                                                                                                                                                                                                                                                      sections:
                                                                                                                                                                                                                                                                                  cisco:
                                                                                                                                                                                                                                                                                                status: "{{ 'PASS' if cisco_audit_result.rc == 0 else 'ISSUES FOUND' }}"
                                                                                                                                                                                                                                                                                                              details: "{{ cisco_audit_result.stdout_lines[-10:] | default(['No output']) }}"
                                                                                                                                                                                                                                                                                                                          linux:
                                                                                                                                                                                                                                                                                                                                        status: "{{ 'PASS' if linux_audit_result.rc == 0 else 'CHANGES NEEDED' }}"
                                                                                                                                                                                                                                                                                                                                                      details: "{{ linux_audit_result.stdout_lines[-10:] | default(['No output']) }}"
                                                                                                                                                                                                                                                                                                                                                                  windows:
                                                                                                                                                                                                                                                                                                                                                                                status: "{{ 'PASS' if windows_audit_result.rc == 0 else 'CHANGES NEEDED' }}"
                                                                                                                                                                                                                                                                                                                                                                                              details: "{{ windows_audit_result.stdout_lines[-10:] | default(['No output']) }}"
                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                  - name: Write JSON compliance report
                                                                                                                                                                                                                                                                                                                                                                                                        copy:
                                                                                                                                                                                                                                                                                                                                                                                                                content: "{{ compliance_data | to_nice_json }}"
                                                                                                                                                                                                                                                                                                                                                                                                                        dest: "{{ json_report }}"
                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                            - name: Generate HTML compliance report
                                                                                                                                                                                                                                                                                                                                                                                                                                  copy:
                                                                                                                                                                                                                                                                                                                                                                                                                                          dest: "{{ report_file }}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                  content: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                            <!DOCTYPE html>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                      <html>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <head>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <title>Compliance Report - {{ timestamp }}</title>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <style>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      body { font-family: Arial, sans-serif; margin: 20px; background: #1a1a2e; color: #e0e0e0; }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    h1 { color: #00d4ff; }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  h2 { color: #00ff88; border-bottom: 1px solid #333; }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                .pass { color: #00ff88; font-weight: bold; }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              .fail { color: #ff4444; font-weight: bold; }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            .warning { color: #ffaa00; font-weight: bold; }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          .section { background: #16213e; padding: 15px; margin: 10px 0; border-radius: 5px; border-left: 4px solid #00d4ff; }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        pre { background: #0f3460; padding: 10px; border-radius: 3px; font-size: 12px; overflow-x: auto; }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      table { width: 100%; border-collapse: collapse; }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    th, td { padding: 8px; text-align: left; border-bottom: 1px solid #333; }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  th { background: #0f3460; color: #00d4ff; }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              </style>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </head>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  <body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              <h1>Compliance Hardening Report</h1>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          <p>Generated: {{ ansible_date_time.iso8601 }}</p>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      <p>Environment: Production | Scope: Network Devices + Linux Servers + Windows Workstations</p>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  <h2>Executive Summary</h2>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              <table>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <tr><th>Component</th><th>Status</th><th>Notes</th></tr>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          <tr>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          <td>Cisco Network Devices</td>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          <td class="{{ 'pass' if cisco_audit_result.rc == 0 else 'fail' }}">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            {{ 'PASS' if cisco_audit_result.rc == 0 else 'ISSUES FOUND' }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </td>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <td>SSH v2, SNMP, NTP, ACL validation</td>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          </tr>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <tr>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <td>Linux Servers (Ubuntu)</td>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <td class="{{ 'pass' if linux_audit_result.rc == 0 else 'warning' }}">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          {{ 'COMPLIANT' if linux_audit_result.rc == 0 else 'CHANGES NEEDED' }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          </td>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          <td>CIS Level 1 + Level 2 benchmarks</td>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </tr>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      <tr>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      <td>Windows Workstations</td>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      <td class="{{ 'pass' if windows_audit_result.rc == 0 else 'warning' }}">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        {{ 'COMPLIANT' if windows_audit_result.rc == 0 else 'CHANGES NEEDED' }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </td>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <td>UAC, Firewall, Audit Policy, Password Policy</td>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      </tr>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  </table>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              <h2>Cisco Audit Results</h2>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          <div class="section">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <pre>{{ cisco_audit_result.stdout | default('No output') }}</pre>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <h2>Linux Hardening Audit (--check mode)</h2>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <div class="section">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          <pre>{{ linux_audit_result.stdout | default('No output') }}</pre>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  <h2>Windows Hardening Audit (--check mode)</h2>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              <div class="section">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <pre>{{ windows_audit_result.stdout | default('No output') }}</pre>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <h2>Remediation Actions Required</h2>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <div class="section">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              <p>Review the full playbook output above. Any tasks showing "changed" in check mode require remediation.</p>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <p>To apply fixes:</p>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          <pre>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    # Apply Linux hardening:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              ansible-playbook playbooks/linux-hardening.yml -i inventory/hosts.yml --tags cis-level-1
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        # Apply Windows hardening:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  ansible-playbook playbooks/windows-hardening.yml -i inventory/hosts.yml
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            # Fix specific Cisco finding:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      # Log in to device and apply recommended config from Cisco audit output
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </pre>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <h2>ITIL Change Control</h2>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <div class="section">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      <p>All remediation changes require a Change Record per ITIL process.</p>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <p>See docs/itil-change-process.md for the change template and CAB approval workflow.</p>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  <p>File change records in: changes/ directory before applying any fixes.</p>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          <p style="color: #666; font-size: 12px;">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        Report generated by compliance-hardening-pipeline |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      Repo: github.com/calvinanglo/compliance-hardening-pipeline
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  </p>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      </html>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          - name: Print report locations
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                debug:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        msg: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  Compliance report generated:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            HTML: {{ report_file }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      JSON: {{ json_report }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          Review findings and file Change Records for any required remediation.
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    Use: cat {{ json_report }} | jq '.sections' for quick summary.
