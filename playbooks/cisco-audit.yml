---
- name: Cisco Device Hardening Audit
  hosts: cisco_devices
    gather_facts: no
      connection: network_cli

        vars:
            audit_results: []
                timestamp: "{{ ansible_date_time.iso8601_basic }}"
                    report_dir: "/tmp/audit_reports"

                      tasks:
                          - name: Create report directory
                                file:
                                        path: "{{ report_dir }}"
                                                state: directory
                                                      run_once: yes
                                                            delegate_to: localhost

                                                                - name: Grab running configuration
                                                                      cisco.ios.ios_command:
                                                                              commands: show running-config
                                                                                    register: running_config
                                                                                          changed_when: false

                                                                                              - name: Check SSH v2 enforced
                                                                                                    set_fact:
                                                                                                            ssh_v2_check: "{{ 'ip ssh version 2' in running_config.stdout[0] }}"
                                                                                                            
                                                                                                                - name: Report SSH v2 status
                                                                                                                      debug:
                                                                                                                              msg: "SSH v2: {{ 'PASS' if ssh_v2_check else 'FAIL - SSH v1 enabled' }}"
                                                                                                                              
                                                                                                                                  - name: Check no default SNMP community strings
                                                                                                                                        set_fact:
                                                                                                                                                snmp_check: "{{ 'snmp-server community public' not in running_config.stdout[0] and 'snmp-server community private' not in running_config.stdout[0] }}"
                                                                                                                                                
                                                                                                                                                    - name: Report SNMP v1 community check
                                                                                                                                                          debug:
                                                                                                                                                                  msg: "SNMP Community Strings: {{ 'PASS' if snmp_check else 'FAIL - public/private community strings detected' }}"
                                                                                                                                                                  
                                                                                                                                                                      - name: Check NTP configured
                                                                                                                                                                            set_fact:
                                                                                                                                                                                    ntp_check: "{{ 'ntp server' in running_config.stdout[0] }}"
                                                                                                                                                                                    
                                                                                                                                                                                        - name: Report NTP status
                                                                                                                                                                                              debug:
                                                                                                                                                                                                      msg: "NTP Configuration: {{ 'PASS' if ntp_check else 'FAIL - No NTP server configured' }}"
                                                                                                                                                                                                      
                                                                                                                                                                                                          - name: Check password encryption enabled
                                                                                                                                                                                                                set_fact:
                                                                                                                                                                                                                        encrypt_check: "{{ 'service password-encryption' in running_config.stdout[0] }}"
                                                                                                                                                                                                                        
                                                                                                                                                                                                                            - name: Report password encryption status
                                                                                                                                                                                                                                  debug:
                                                                                                                                                                                                                                          msg: "Password Encryption: {{ 'PASS' if encrypt_check else 'FAIL - Passwords may be stored in plaintext' }}"
                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                              - name: Check logging configured
                                                                                                                                                                                                                                                    set_fact:
                                                                                                                                                                                                                                                            logging_check: "{{ 'logging host' in running_config.stdout[0] or 'logging 1' in running_config.stdout[0] }}"
                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                - name: Report logging status
                                                                                                                                                                                                                                                                      debug:
                                                                                                                                                                                                                                                                              msg: "Logging Configuration: {{ 'PASS' if logging_check else 'FAIL - No syslog server configured' }}"
                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                  - name: Check management access restricted
                                                                                                                                                                                                                                                                                        set_fact:
                                                                                                                                                                                                                                                                                                acl_check: "{{ 'access-list' in running_config.stdout[0] and 'line vty' in running_config.stdout[0] }}"
                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                    - name: Report ACL status
                                                                                                                                                                                                                                                                                                          debug:
                                                                                                                                                                                                                                                                                                                  msg: "Management Access Control: {{ 'PASS' if acl_check else 'FAIL - No ACL restricting VTY access' }}"
                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                      - name: Compile audit results
                                                                                                                                                                                                                                                                                                                            set_fact:
                                                                                                                                                                                                                                                                                                                                    audit_summary:
                                                                                                                                                                                                                                                                                                                                              device: "{{ inventory_hostname }}"
                                                                                                                                                                                                                                                                                                                                                        timestamp: "{{ timestamp }}"
                                                                                                                                                                                                                                                                                                                                                                  checks:
                                                                                                                                                                                                                                                                                                                                                                              - name: SSH v2 Enforcement
                                                                                                                                                                                                                                                                                                                                                                                            status: "{{ 'PASS' if ssh_v2_check else 'FAIL' }}"
                                                                                                                                                                                                                                                                                                                                                                                                          severity: "{{ 'INFO' if ssh_v2_check else 'HIGH' }}"
                                                                                                                                                                                                                                                                                                                                                                                                                        remediation: "Configure: ip ssh version 2"
                                                                                                                                                                                                                                                                                                                                                                                                                                    - name: SNMP Community Strings
                                                                                                                                                                                                                                                                                                                                                                                                                                                  status: "{{ 'PASS' if snmp_check else 'FAIL' }}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                severity: "{{ 'INFO' if snmp_check else 'CRITICAL' }}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                              remediation: "Remove: snmp-server community public/private; use SNMPv3"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          - name: NTP Server Configuration
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        status: "{{ 'PASS' if ntp_check else 'FAIL' }}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      severity: "{{ 'INFO' if ntp_check else 'MEDIUM' }}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    remediation: "Configure: ntp server <IP>"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                - name: Password Encryption
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              status: "{{ 'PASS' if encrypt_check else 'FAIL' }}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            severity: "{{ 'INFO' if encrypt_check else 'HIGH' }}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          remediation: "Configure: service password-encryption"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      - name: Syslog Forwarding
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    status: "{{ 'PASS' if logging_check else 'FAIL' }}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  severity: "{{ 'INFO' if logging_check else 'MEDIUM' }}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                remediation: "Configure: logging host <syslog_server>"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            - name: Management Access Control
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          status: "{{ 'PASS' if acl_check else 'FAIL' }}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        severity: "{{ 'INFO' if acl_check else 'HIGH' }}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      remediation: "Create ACL, apply to: line vty 0 15, access-class <ACL> in"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          - name: Calculate compliance score
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                set_fact:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        pass_count: "{{ audit_summary.checks | selectattr('status', 'equalto', 'PASS') | list | length }}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                total_checks: "{{ audit_summary.checks | length }}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        compliance_percentage: "{{ (audit_summary.checks | selectattr('status', 'equalto', 'PASS') | list | length) * 100 // (audit_summary.checks | length) }}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            - name: Display compliance score
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  debug:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          msg: "Device {{ inventory_hostname }} Compliance: {{ compliance_percentage }}% ({{ pass_count }}/{{ total_checks }} checks pass)"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              - name: Save audit report to file
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    copy:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            content: "{{ audit_summary | to_nice_yaml }}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    dest: "{{ report_dir }}/cisco-audit-{{ inventory_hostname }}-{{ timestamp }}.yml"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          delegate_to: localhost
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            post_tasks:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                - name: Generate summary report
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      debug:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              msg: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        ========================================
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  CISCO HARDENING AUDIT SUMMARY
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            ========================================
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      Device: {{ inventory_hostname }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                Compliance: {{ compliance_percentage }}%
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          Passed: {{ pass_count }}/{{ total_checks }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                               
