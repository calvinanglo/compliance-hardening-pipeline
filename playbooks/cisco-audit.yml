---
- name: Cisco Device Hardening Audit
  hosts: cisco_devices
  gather_facts: no
  connection: network_cli

  vars:
    audit_results: []
    timestamp: "{{ ansible_date_time.iso8601_basic }}"
    report_dir: "/tmp/audit_reports"

  tasks:

    - name: Create report directory
      file:
        path: "{{ report_dir }}"
        state: directory
      run_once: yes
      delegate_to: localhost

    - name: Grab running configuration
      cisco.ios.ios_command:
        commands: show running-config
      register: running_config
      changed_when: false

    - name: Check SSH version is 2
      cisco.ios.ios_command:
        commands: show ip ssh
      register: ssh_check
      changed_when: false

    - name: AUDIT - SSH version
      set_fact:
        audit_results: "{{ audit_results + [{'check': 'SSH version 2', 'status': 'PASS' if 'SSH Enabled - version 2.0' in ssh_check.stdout[0] else 'FAIL', 'detail': ssh_check.stdout[0] | regex_search('SSH Enabled.*')}] }}"

    - name: Check SNMPv3 is configured
      cisco.ios.ios_command:
        commands: show snmp user
      register: snmp_check
      changed_when: false

    - name: AUDIT - SNMPv3 user present
      set_fact:
        audit_results: "{{ audit_results + [{'check': 'SNMPv3 user wazuh-monitor', 'status': 'PASS' if 'wazuh-monitor' in snmp_check.stdout[0] else 'FAIL', 'detail': snmp_check.stdout[0][:100]}] }}"

    - name: Check NTP is configured
      cisco.ios.ios_command:
        commands: show ntp status
      register: ntp_check
      changed_when: false

    - name: AUDIT - NTP synchronized
      set_fact:
        audit_results: "{{ audit_results + [{'check': 'NTP synchronized', 'status': 'PASS' if 'synchronized' in ntp_check.stdout[0] else 'FAIL', 'detail': ntp_check.stdout[0][:100]}] }}"

    - name: Check logging is configured
      cisco.ios.ios_command:
        commands: show logging
      register: logging_check
      changed_when: false

    - name: AUDIT - Syslog host configured
      set_fact:
        audit_results: "{{ audit_results + [{'check': 'Syslog to 10.10.20.10', 'status': 'PASS' if '10.10.20.10' in logging_check.stdout[0] else 'FAIL', 'detail': 'Syslog host check'}] }}"

    - name: Check HTTP server is disabled
      cisco.ios.ios_command:
        commands: show ip http server status
      register: http_check
      changed_when: false

    - name: AUDIT - HTTP server disabled
      set_fact:
        audit_results: "{{ audit_results + [{'check': 'HTTP server disabled', 'status': 'PASS' if 'HTTP server enabled: no' in http_check.stdout[0] else 'FAIL', 'detail': http_check.stdout[0][:100]}] }}"

    - name: Check CDP is disabled
      cisco.ios.ios_command:
        commands: show cdp
      register: cdp_check
      changed_when: false
      ignore_errors: yes

    - name: AUDIT - CDP disabled
      set_fact:
        audit_results: "{{ audit_results + [{'check': 'CDP disabled', 'status': 'PASS' if cdp_check.failed or 'not enabled' in cdp_check.stdout[0] | lower else 'FAIL', 'detail': 'CDP check'}] }}"

    - name: Write audit results to file
      copy:
        content: |
          Cisco Hardening Audit Report
          Device: {{ inventory_hostname }}
          Timestamp: {{ timestamp }}
          {% for item in audit_results %}
          [{{ item.status }}] {{ item.check }}
          {% endfor %}
        dest: "{{ report_dir }}/{{ inventory_hostname }}-audit-{{ timestamp }}.txt"
      delegate_to: localhost

    - name: Print summary
      debug:
        msg: "{{ inventory_hostname }} - PASS: {{ audit_results | selectattr('status', 'eq', 'PASS') | list | length }} / {{ audit_results | length }}"
