---
# Windows 10/11 Workstation Hardening
# Requires WinRM enabled on target hosts
# Enable WinRM: Enable-PSRemoting -Force
# Run with: ansible-playbook windows-hardening.yml -i inventory/hosts.yml

- name: Windows Workstation Hardening
  hosts: windows_workstations
  gather_facts: yes

  vars:
    wazuh_server: "10.10.20.10"

  tasks:

    # UAC - User Account Control
    - name: enable UAC and set to highest level
      win_regedit:
        path: HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System
        name: EnableLUA
        data: 1
        type: dword
      tags: uac,cis

    - name: set UAC consent prompt to secure desktop
      win_regedit:
        path: HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System
        name: ConsentPromptBehaviorAdmin
        data: 2
        type: dword
      tags: uac,cis

    # Windows Firewall
    - name: enable windows firewall on all profiles
      win_shell: Set-NetFirewallProfile -Profile Domain,Public,Private -Enabled True
      tags: firewall,cis

    - name: block inbound connections by default
      win_shell: Set-NetFirewallProfile -Profile Domain,Public,Private -DefaultInboundAction Block
      tags: firewall,cis

    - name: allow outbound connections by default
      win_shell: Set-NetFirewallProfile -Profile Domain,Public,Private -DefaultOutboundAction Allow
      tags: firewall,cis

    # Remote Desktop Security
    - name: disable rdp if not required
      win_regedit:
        path: HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server
        name: fDenyTSConnections
        data: 1
        type: dword
      tags: rdp,cis

    - name: set rdp to require NLA if rdp is used
      win_regedit:
        path: HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp
        name: UserAuthentication
        data: 1
        type: dword
      tags: rdp,cis

    # Account policies
    - name: set account lockout threshold to 5 attempts
      win_shell: net accounts /lockoutthreshold:5
      tags: accounts,cis

    - name: set account lockout duration to 30 minutes
      win_shell: net accounts /lockoutduration:30
      tags: accounts,cis

    - name: set minimum password length to 14 characters
      win_shell: net accounts /minpwlen:14
      tags: accounts,cis

    - name: set password history to remember last 24
      win_shell: net accounts /uniquepw:24
      tags: accounts,cis

    # Disable unnecessary services
    - name: disable print spooler if no printer attached
      win_service:
        name: Spooler
        start_mode: disabled
        state: stopped
      failed_when: false
      tags: services,cis

    - name: disable windows remote registry
      win_service:
        name: RemoteRegistry
        start_mode: disabled
        state: stopped
      failed_when: false
      tags: services,cis

    - name: disable telnet client
      win_optional_feature:
        name: TelnetClient
        state: absent
      failed_when: false
      tags: services,cis

    # Windows Defender / AV
    - name: ensure windows defender is enabled
      win_shell: Set-MpPreference -DisableRealtimeMonitoring $false
      tags: defender,cis

    - name: enable cloud-delivered protection
      win_shell: Set-MpPreference -MAPSReporting Advanced
      tags: defender,cis

    - name: enable controlled folder access
      win_shell: Set-MpPreference -EnableControlledFolderAccess Enabled
      tags: defender,cis

    # Auditing and Event Logging
    - name: enable audit policy - account logon events
      win_shell: auditpol /set /subcategory:"Logon" /success:enable /failure:enable
      tags: audit,cis

    - name: enable audit policy - privilege use
      win_shell: auditpol /set /subcategory:"Sensitive Privilege Use" /success:enable /failure:enable
      tags: audit,cis

    - name: enable audit policy - process creation
      win_shell: auditpol /set /subcategory:"Process Creation" /success:enable
      tags: audit,cis

    - name: increase security event log size to 1GB
      win_regedit:
        path: HKLM:\SYSTEM\CurrentControlSet\Services\EventLog\Security
        name: MaxSize
        data: 1073741824
        type: dword
      tags: audit,cis

    # Registry-based security hardening
    - name: disable autorun and autoplay
      win_regedit:
        path: HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\Explorer
        name: NoDriveTypeAutoRun
        data: 255
        type: dword
      tags: registry,cis

    - name: disable anonymous access to named pipes and shares
      win_regedit:
        path: HKLM:\SYSTEM\CurrentControlSet\Control\Lsa
        name: RestrictAnonymous
        data: 1
        type: dword
      tags: registry,cis

    - name: enable sehop to prevent stack overflows
      win_regedit:
        path: HKLM:\SYSTEM\CurrentControlSet\Control\Session Manager\kernel
        name: DisableExceptionChainValidation
        data: 0
        type: dword
      tags: registry,cis

    # WinRM hardening - allow ansible to manage but restrict access
    - name: set winrm authentication to ntlm only (no kerberos - home lab)
      win_shell: winrm set winrm/config/service/auth '@{NTLM="true"; Kerberos="false"}'
      tags: winrm

    - name: restrict winrm access to management vlan only
      win_shell: >
        $rule = New-NetFirewallRule -DisplayName "WinRM-Management-Only"
        -Direction Inbound -Protocol TCP -LocalPort 5985
        -RemoteAddress 10.10.99.0/24 -Action Allow;
        Get-NetFirewallRule -DisplayName "Windows Remote Management*" |
        Where-Object {$_.DisplayName -ne "WinRM-Management-Only"} |
        Set-NetFirewallRule -Action Block
      tags: winrm
