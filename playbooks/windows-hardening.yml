---
# Windows 10/11 Workstation Hardening
# Requires WinRM enabled on target hosts
# Enable WinRM: Enable-PSRemoting -Force
# Run with: ansible-playbook windows-hardening.yml -i inventory/hosts.yml

- name: Windows Workstation Hardening
  hosts: windows_workstations
    gather_facts: yes

      vars:
          wazuh_server: "10.10.20.10"

            tasks:

                # UAC - User Account Control
                    - name: Enable UAC and set to highest level
                          win_regedit:
                                  path: HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System
                                          name: EnableLUA
                                                  data: 1
                                                          type: dword
                                                                tags: [uac, cis-level-1]

                                                                    - name: Set UAC behavior for admins to prompt for credentials
                                                                          win_regedit:
                                                                                  path: HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System
                                                                                          name: ConsentPromptBehaviorAdmin
                                                                                                  data: 2
                                                                                                          type: dword
                                                                                                                tags: [uac, cis-level-1]
                                                                                                                
                                                                                                                    # Windows Firewall
                                                                                                                        - name: Enable Windows Firewall for all profiles
                                                                                                                              win_shell: Set-NetFirewallProfile -Profile Domain,Public,Private -Enabled True
                                                                                                                                    tags: [firewall, cis-level-1]
                                                                                                                                    
                                                                                                                                        - name: Block inbound by default on public profile
                                                                                                                                              win_shell: Set-NetFirewallProfile -Profile Public -DefaultInboundAction Block
                                                                                                                                                    tags: [firewall, cis-level-1]
                                                                                                                                                    
                                                                                                                                                        # Disable unnecessary services
                                                                                                                                                            - name: Disable LLMNR (Link-Local Multicast Name Resolution)
                                                                                                                                                                  win_regedit:
                                                                                                                                                                          path: HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\DNSClient
                                                                                                                                                                                  name: EnableMulticast
                                                                                                                                                                                          data: 0
                                                                                                                                                                                                  type: dword
                                                                                                                                                                                                        tags: [services, cis-level-1]
                                                                                                                                                                                                        
                                                                                                                                                                                                            - name: Disable NetBIOS over TCP/IP
                                                                                                                                                                                                                  win_shell: |
                                                                                                                                                                                                                          $adapters = Get-WmiObject -Class Win32_NetworkAdapterConfiguration -Filter "IPEnabled = TRUE"
                                                                                                                                                                                                                                  foreach ($adapter in $adapters) { $adapter.SetTcpipNetbios(2) }
                                                                                                                                                                                                                                        tags: [services, cis-level-1]
                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                            - name: Disable Remote Registry service
                                                                                                                                                                                                                                                  win_service:
                                                                                                                                                                                                                                                          name: RemoteRegistry
                                                                                                                                                                                                                                                                  start_mode: disabled
                                                                                                                                                                                                                                                                          state: stopped
                                                                                                                                                                                                                                                                                tags: [services, cis-level-1]
                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                    - name: Disable Telnet client if installed
                                                                                                                                                                                                                                                                                          win_optional_feature:
                                                                                                                                                                                                                                                                                                  name: TelnetClient
                                                                                                                                                                                                                                                                                                          state: absent
                                                                                                                                                                                                                                                                                                                ignore_errors: yes
                                                                                                                                                                                                                                                                                                                      tags: [services, cis-level-1]
                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                          # Audit Policy
                                                                                                                                                                                                                                                                                                                              - name: Enable audit policy - Logon events success and failure
                                                                                                                                                                                                                                                                                                                                    win_shell: auditpol /set /subcategory:"Logon" /success:enable /failure:enable
                                                                                                                                                                                                                                                                                                                                          tags: [audit, cis-level-1]
                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                              - name: Enable audit policy - Account management
                                                                                                                                                                                                                                                                                                                                                    win_shell: auditpol /set /subcategory:"User Account Management" /success:enable /failure:enable
                                                                                                                                                                                                                                                                                                                                                          tags: [audit, cis-level-1]
                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                              - name: Enable audit policy - Privilege use
                                                                                                                                                                                                                                                                                                                                                                    win_shell: auditpol /set /subcategory:"Sensitive Privilege Use" /success:enable /failure:enable
                                                                                                                                                                                                                                                                                                                                                                          tags: [audit, cis-level-1]
                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                              - name: Enable audit policy - System events
                                                                                                                                                                                                                                                                                                                                                                                    win_shell: auditpol /set /subcategory:"Security System Extension" /success:enable /failure:enable
                                                                                                                                                                                                                                                                                                                                                                                          tags: [audit, cis-level-1]
                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                              - name: Enable audit policy - Object access file system
                                                                                                                                                                                                                                                                                                                                                                                                    win_shell: auditpol /set /subcategory:"File System" /success:enable /failure:enable
                                                                                                                                                                                                                                                                                                                                                                                                          tags: [audit, cis-level-1]
                                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                              # Password Policy
                                                                                                                                                                                                                                                                                                                                                                                                                  - name: Set minimum password length to 14
                                                                                                                                                                                                                                                                                                                                                                                                                        win_shell: net accounts /minpwlen:14
                                                                                                                                                                                                                                                                                                                                                                                                                              tags: [passwords, cis-level-1]
                                                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                                                  - name: Set password history to 24
                                                                                                                                                                                                                                                                                                                                                                                                                                        win_shell: net accounts /uniquepw:24
                                                                                                                                                                                                                                                                                                                                                                                                                                              tags: [passwords, cis-level-1]
                                                                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                                                                  - name: Set account lockout threshold to 5 attempts
                                                                                                                                                                                                                                                                                                                                                                                                                                                        win_shell: net accounts /lockoutthreshold:5
                                                                                                                                                                                                                                                                                                                                                                                                                                                              tags: [passwords, cis-level-1]
                                                                                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                                                                                  - name: Set account lockout duration to 30 minutes
                                                                                                                                                                                                                                                                                                                                                                                                                                                                        win_shell: net accounts /lockoutduration:30
                                                                                                                                                                                                                                                                                                                                                                                                                                                                              tags: [passwords, cis-level-1]
                                                                                                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  # Automatic Updates
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      - name: Configure Windows Update - Auto download notify for install
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            win_regedit:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    path: HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\WindowsUpdate\Auto Update
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            name: AUOptions
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    data: 3
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            type: dword
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  tags: [updates, cis-level-1]
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      # Disable AutoRun/AutoPlay
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          - name: Disable AutoRun for all drives
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                win_regedit:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        path: HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\Explorer
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                name: NoDriveTypeAutoRun
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        data: 255
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                type: dword
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      tags: [autorun, cis-level-1]
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          # Screensaver with password lock
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              - name: Require password on screensaver
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    win_regedit:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            path: HKCU:\Control Panel\Desktop
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    name: ScreenSaverIsSecure
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            data: "1"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    type: string
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          tags: [screen, cis-level-1]
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              - name: Set screensaver timeout to 900 seconds 15 min
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    win_regedit:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            path: HKCU:\Control Panel\Desktop
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    name: ScreenSaveTimeOut
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            data: "900"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    type: string
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          tags: [screen, cis-level-1]
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              # Wazuh Agent - Forward to SIEM
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  - name: Check if Wazuh agent is installed
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        win_service:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                name: WazuhSvc
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      register: wazuh_service
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            ignore_errors: yes
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  tags: [monitoring]
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      - name: Report Wazuh agent status
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            debug:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    msg: "Wazuh agent: {{ 'INSTALLED' if not wazuh_service.failed else 'NOT INSTALLED - install manually' }}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          tags: [monitoring]
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              # Compliance Verification
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  - name: Check UAC is enabled
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        win_shell: (Get-ItemProperty "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System").EnableLUA
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              register: uac_check
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    changed_when: false
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          tags: [verify]
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              - name: Report UAC status
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    debug:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            msg: "UAC: {{ 'ENABLED' if uac_check.stdout.strip() == '1' else 'DISABLED - fix required' }}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  tags: [verify]
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      - name: Check Windows Firewall status
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            win_shell: (Get-NetFirewallProfile -Profile Domain).Enabled
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  register: fw_check
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        changed_when: false
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              tags: [verify]
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  - name: Report Firewall status
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        debug:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                msg: "Windows Firewall: {{ 'ENABLED' if fw_check.stdout.strip() == 'True' else 'DISABLED - fix required' }}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      tags: [verify]
