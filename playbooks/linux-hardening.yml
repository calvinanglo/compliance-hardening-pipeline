---
# CIS Ubuntu Linux Benchmark - Level 1 + Level 2 hardening
# Run with --check flag first to preview before applying
# Tags: cis-level-1, cis-level-2, ssh, network, logging, filesystem

- name: CIS Linux Hardening - Ubuntu Servers
  hosts: linux_servers
    become: yes

      handlers:
        - name: restart sshd
            service:
                  name: sshd
                        state: restarted
                          - name: restart auditd
                              service:
                                    name: auditd
                                          state: restarted
                                            - name: reload sysctl
                                                command: sysctl --system

                                                  tasks:

                                                    # Section 1 - Filesystem Hardening
                                                      - name: 1.1 Disable unused filesystems
                                                          copy:
                                                                dest: /etc/modprobe.d/CIS.conf
                                                                      content: |
                                                                              install cramfs /bin/true
                                                                                      install freevxfs /bin/true
                                                                                              install jffs2 /bin/true
                                                                                                      install hfs /bin/true
                                                                                                              install hfsplus /bin/true
                                                                                                                      install udf /bin/true
                                                                                                                          tags: [cis-level-1, filesystem]
                                                                                                                          
                                                                                                                            # Section 3 - Network Configuration
                                                                                                                              - name: 3.1 Disable IP forwarding
                                                                                                                                  sysctl:
                                                                                                                                        name: net.ipv4.ip_forward
                                                                                                                                              value: "0"
                                                                                                                                                    state: present
                                                                                                                                                          reload: yes
                                                                                                                                                              tags: [cis-level-1, network]
                                                                                                                                                              
                                                                                                                                                                - name: 3.2 Disable ICMP redirect acceptance
                                                                                                                                                                    sysctl:
                                                                                                                                                                          name: "{{ item }}"
                                                                                                                                                                                value: "0"
                                                                                                                                                                                      state: present
                                                                                                                                                                                          loop:
                                                                                                                                                                                                - net.ipv4.conf.all.accept_redirects
                                                                                                                                                                                                      - net.ipv4.conf.default.accept_redirects
                                                                                                                                                                                                            - net.ipv4.conf.all.send_redirects
                                                                                                                                                                                                                  - net.ipv4.conf.default.send_redirects
                                                                                                                                                                                                                      tags: [cis-level-1, network]
                                                                                                                                                                                                                      
                                                                                                                                                                                                                        - name: 3.3 Enable TCP SYN cookies
                                                                                                                                                                                                                            sysctl:
                                                                                                                                                                                                                                  name: net.ipv4.tcp_syncookies
                                                                                                                                                                                                                                        value: "1"
                                                                                                                                                                                                                                              state: present
                                                                                                                                                                                                                                                  tags: [cis-level-1, network]
                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                    - name: 3.4 Enable reverse path filtering
                                                                                                                                                                                                                                                        sysctl:
                                                                                                                                                                                                                                                              name: "{{ item }}"
                                                                                                                                                                                                                                                                    value: "1"
                                                                                                                                                                                                                                                                          state: present
                                                                                                                                                                                                                                                                              loop:
                                                                                                                                                                                                                                                                                    - net.ipv4.conf.all.rp_filter
                                                                                                                                                                                                                                                                                          - net.ipv4.conf.default.rp_filter
                                                                                                                                                                                                                                                                                              tags: [cis-level-1, network]
                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                # Section 4 - Logging and Auditing
                                                                                                                                                                                                                                                                                                  - name: 4.1 Install and enable auditd
                                                                                                                                                                                                                                                                                                      apt:
                                                                                                                                                                                                                                                                                                            name: auditd
                                                                                                                                                                                                                                                                                                                  state: present
                                                                                                                                                                                                                                                                                                                      tags: [cis-level-1, logging]
                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                        - name: 4.2 Enable auditd service
                                                                                                                                                                                                                                                                                                                            service:
                                                                                                                                                                                                                                                                                                                                  name: auditd
                                                                                                                                                                                                                                                                                                                                        state: started
                                                                                                                                                                                                                                                                                                                                              enabled: yes
                                                                                                                                                                                                                                                                                                                                                  tags: [cis-level-1, logging]
                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                    - name: 4.3 Audit login events
                                                                                                                                                                                                                                                                                                                                                        copy:
                                                                                                                                                                                                                                                                                                                                                              dest: /etc/audit/rules.d/logins.rules
                                                                                                                                                                                                                                                                                                                                                                    content: |
                                                                                                                                                                                                                                                                                                                                                                            -w /var/log/lastlog -p wa -k logins
                                                                                                                                                                                                                                                                                                                                                                                    -w /var/run/faillock/ -p wa -k logins
                                                                                                                                                                                                                                                                                                                                                                                        notify: restart auditd
                                                                                                                                                                                                                                                                                                                                                                                            tags: [cis-level-1, logging]
                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                              - name: 4.4 Audit sudo usage
                                                                                                                                                                                                                                                                                                                                                                                                  copy:
                                                                                                                                                                                                                                                                                                                                                                                                        dest: /etc/audit/rules.d/sudo.rules
                                                                                                                                                                                                                                                                                                                                                                                                              content: |
                                                                                                                                                                                                                                                                                                                                                                                                                      -w /usr/bin/sudo -p x -k sudo_usage
                                                                                                                                                                                                                                                                                                                                                                                                                              -w /etc/sudoers -p rwa -k sudoers
                                                                                                                                                                                                                                                                                                                                                                                                                                      -w /etc/sudoers.d/ -p rwa -k sudoers
                                                                                                                                                                                                                                                                                                                                                                                                                                          notify: restart auditd
                                                                                                                                                                                                                                                                                                                                                                                                                                              tags: [cis-level-1, logging]
                                                                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                                                                - name: 4.5 Audit file deletions
                                                                                                                                                                                                                                                                                                                                                                                                                                                    copy:
                                                                                                                                                                                                                                                                                                                                                                                                                                                          dest: /etc/audit/rules.d/deletions.rules
                                                                                                                                                                                                                                                                                                                                                                                                                                                                content: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                        -a always,exit -F arch=b64 -S unlink -S unlinkat -S rename -S renameat -F auid>=1000 -F auid!=4294967295 -k delete
                                                                                                                                                                                                                                                                                                                                                                                                                                                                            notify: restart auditd
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                tags: [cis-level-1, logging]
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  - name: 4.6 Forward logs to Wazuh
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      lineinfile:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            path: /etc/rsyslog.conf
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  line: "*.* @10.10.20.10:514"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        create: yes
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            tags: [cis-level-1, logging]
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              # Section 5 - SSH Hardening
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                - name: 5.1 SSH hardening config
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    lineinfile:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          path: /etc/ssh/sshd_config
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                regexp: "{{ item.regexp }}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      line: "{{ item.line }}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          loop:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                - { regexp: '^#?PermitRootLogin', line: 'PermitRootLogin no' }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      - { regexp: '^#?MaxAuthTries', line: 'MaxAuthTries 4' }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            - { regexp: '^#?PermitEmptyPasswords', line: 'PermitEmptyPasswords no' }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  - { regexp: '^#?X11Forwarding', line: 'X11Forwarding no' }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        - { regexp: '^#?LoginGraceTime', line: 'LoginGraceTime 60' }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              - { regexp: '^#?Protocol', line: 'Protocol 2' }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    - { regexp: '^#?ClientAliveInterval', line: 'ClientAliveInterval 300' }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          - { regexp: '^#?MaxSessions', line: 'MaxSessions 4' }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                - { regexp: '^#?HostbasedAuthentication', line: 'HostbasedAuthentication no' }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    notify: restart sshd
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        tags: [cis-level-1, ssh]
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          # Section 5 - Password Policy
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            - name: 5.2 Password quality requirements
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                lineinfile:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      path: /etc/security/pwquality.conf
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            regexp: "{{ item.regexp }}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  line: "{{ item.line }}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        create: yes
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            loop:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  - { regexp: '^minlen', line: 'minlen = 14' }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        - { regexp: '^dcredit', line: 'dcredit = -1' }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              - { regexp: '^ucredit', line: 'ucredit = -1' }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    - { regexp: '^ocredit', line: 'ocredit = -1' }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          - { regexp: '^lcredit', line: 'lcredit = -1' }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              tags: [cis-level-1, passwords]
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                - name: 5.3 Password expiry settings
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    lineinfile:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          path: /etc/login.defs
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                regexp: "{{ item.regexp }}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      line: "{{ item.line }}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          loop:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                - { regexp: '^PASS_MAX_DAYS', line: 'PASS_MAX_DAYS 365' }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      - { regexp: '^PASS_MIN_DAYS', line: 'PASS_MIN_DAYS 7' }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            - { regexp: '^PASS_WARN_AGE', line: 'PASS_WARN_AGE 7' }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                tags: [cis-level-1, passwords]
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  # Section 6 - System Maintenance
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    - name: 6.1 Set cron permissions
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        file:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              path: /etc/crontab
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    owner: root
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          group: root
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                mode: '0600'
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    tags: [cis-level-1, maintenance]
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      - name: 6.2 Check for empty passwords
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          command: awk -F":" '($2 == "") {print $1}' /etc/shadow
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              register: empty_passwords
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  changed_when: false
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      tags: [cis-level-1, maintenance]
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        - name: 6.3 Report empty passwords
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            debug:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  msg: "WARNING - accounts with empty passwords: {{ empty_passwords.stdout_lines }}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      when: empty_passwords.stdout != ""
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          tags: [cis-level-1, maintenance]
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            # Level 2 - File Integrity Monitoring
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              - name: L2 Install AIDE
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  apt:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        name: aide
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              state: present
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  tags: [cis-level-2, integrity]
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    - name: L2 Initialize AIDE database
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        command: aideinit
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            args:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  creates: /var/lib/aide/aide.db
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      tags: [cis-level-2, integrity]
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        - name: L2 Schedule daily AIDE check
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            cron:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  name: "AIDE integrity check"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        minute: "0"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              hour: "3"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    job: "/usr/bin/aide --check >> /var/log/aide-check.log 2>&1"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          user: root
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              tags: [cis-level-2, integrity]
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                - name: L2 Enable AppArmor
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    apt:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          name: apparmor
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                state: present
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    tags: [cis-level-2, mac]
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      - name: L2 Start AppArmor
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          service:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                name: apparmor
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      state: started
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            enabled: yes
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                tags: [cis-level-2, mac]
