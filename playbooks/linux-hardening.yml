---
# CIS Ubuntu Linux Benchmark - Level 1 + Level 2 hardening
# Run with --check flag first to preview before applying
# Tags: cis-level-1, cis-level-2, ssh, network, logging, filesystem

- name: CIS Linux Hardening - Ubuntu Servers
  hosts: linux_servers
  become: yes

  vars:
    wazuh_server: "10.10.20.10"

  handlers:
    - name: restart sshd
      service:
        name: sshd
        state: restarted

    - name: restart auditd
      service:
        name: auditd
        state: restarted

    - name: reload sysctl
      command: sysctl --system

  tasks:

    # filesystem hardening
    - name: disable unused filesystems - cramfs
      kernel_module:
        name: cramfs
        state: absent
      tags: cis-level-1,filesystem

    - name: disable unused filesystems - freevxfs
      kernel_module:
        name: freevxfs
        state: absent
      tags: cis-level-1,filesystem

    - name: disable unused filesystems - jffs2
      kernel_module:
        name: jffs2
        state: absent
      tags: cis-level-1,filesystem

    - name: disable usb storage
      kernel_module:
        name: usb-storage
        state: absent
      tags: cis-level-1,filesystem

    # network hardening via sysctl
    - name: set sysctl - disable ipv4 forwarding
      sysctl:
        name: net.ipv4.ip_forward
        value: '0'
        sysctl_set: yes
        state: present
        reload: no
      notify: reload sysctl
      tags: cis-level-1,network

    - name: set sysctl - ignore icmp broadcasts
      sysctl:
        name: net.ipv4.icmp_echo_ignore_broadcasts
        value: '1'
        sysctl_set: yes
        state: present
        reload: no
      notify: reload sysctl
      tags: cis-level-1,network

    - name: set sysctl - disable source routing
      sysctl:
        name: net.ipv4.conf.all.accept_source_route
        value: '0'
        sysctl_set: yes
        state: present
        reload: no
      notify: reload sysctl
      tags: cis-level-1,network

    - name: set sysctl - enable reverse path filtering
      sysctl:
        name: net.ipv4.conf.all.rp_filter
        value: '1'
        sysctl_set: yes
        state: present
        reload: no
      notify: reload sysctl
      tags: cis-level-1,network

    - name: set sysctl - disable ipv6 if not needed
      sysctl:
        name: net.ipv6.conf.all.disable_ipv6
        value: '1'
        sysctl_set: yes
        state: present
        reload: no
      notify: reload sysctl
      tags: cis-level-1,network

    # SSH hardening
    - name: configure sshd - secure defaults
      template:
        src: templates/sshd_config.j2
        dest: /etc/ssh/sshd_config
        owner: root
        group: root
        mode: '0600'
        validate: /usr/sbin/sshd -t -f %s
      notify: restart sshd
      tags: cis-level-1,ssh

    - name: ensure ssh uses only strong ciphers
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^Ciphers'
        line: 'Ciphers aes256-ctr,aes192-ctr,aes128-ctr'
        validate: /usr/sbin/sshd -t -f %s
      notify: restart sshd
      tags: cis-level-1,ssh

    - name: disable root ssh login
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^PermitRootLogin'
        line: 'PermitRootLogin no'
        validate: /usr/sbin/sshd -t -f %s
      notify: restart sshd
      tags: cis-level-1,ssh

    - name: disable password auth - key-based only
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^PasswordAuthentication'
        line: 'PasswordAuthentication no'
        validate: /usr/sbin/sshd -t -f %s
      notify: restart sshd
      tags: cis-level-1,ssh

    # user and account policies
    - name: set password minimum age
      lineinfile:
        path: /etc/login.defs
        regexp: '^PASS_MIN_DAYS'
        line: 'PASS_MIN_DAYS 7'
      tags: cis-level-1,accounts

    - name: set password maximum age
      lineinfile:
        path: /etc/login.defs
        regexp: '^PASS_MAX_DAYS'
        line: 'PASS_MAX_DAYS 90'
      tags: cis-level-1,accounts

    - name: set password warning days
      lineinfile:
        path: /etc/login.defs
        regexp: '^PASS_WARN_AGE'
        line: 'PASS_WARN_AGE 14'
      tags: cis-level-1,accounts

    - name: ensure inactive accounts are locked after 30 days
      command: useradd -D -f 30
      changed_when: false
      tags: cis-level-1,accounts

    # logging and auditing
    - name: ensure auditd is installed
      apt:
        name: auditd
        state: present
      tags: cis-level-2,logging

    - name: configure auditd rules for privileged commands
      copy:
        content: |
          -a always,exit -F arch=b64 -S adjtimex -S settimeofday -k time-change
          -a always,exit -F arch=b32 -S adjtimex -S settimeofday -S stime -k time-change
          -w /etc/localtime -p wa -k time-change
          -w /etc/group -p wa -k identity
          -w /etc/passwd -p wa -k identity
          -w /etc/gshadow -p wa -k identity
          -w /etc/shadow -p wa -k identity
          -w /etc/sudoers -p wa -k sudoers
          -w /var/log/faillog -p wa -k logins
          -w /var/log/lastlog -p wa -k logins
          -a always,exit -F arch=b64 -S execve -F euid=0 -F auid>=1000 -F auid!=4294967295 -k root_commands
        dest: /etc/audit/rules.d/hardening.rules
        owner: root
        group: root
        mode: '0640'
      notify: restart auditd
      tags: cis-level-2,logging

    - name: configure rsyslog to forward to wazuh
      lineinfile:
        path: /etc/rsyslog.conf
        line: "*.* @{{ wazuh_server }}:514"
        create: yes
      tags: cis-level-2,logging

    # services
    - name: disable unnecessary services
      service:
        name: "{{ item }}"
        state: stopped
        enabled: no
      loop:
        - avahi-daemon
        - cups
        - rpcbind
      failed_when: false
      tags: cis-level-1,services

    - name: ensure cron is restricted to authorized users
      file:
        path: /etc/cron.deny
        state: absent
      tags: cis-level-1,services

    - name: ensure cron.allow exists with only root
      copy:
        content: "root\n"
        dest: /etc/cron.allow
        owner: root
        group: root
        mode: '0600'
      tags: cis-level-1,services

    # package management
    - name: ensure gpg is configured for apt
      apt:
        name: gnupg2
        state: present
      tags: cis-level-1,packages

    - name: ensure unattended-upgrades is installed and enabled
      apt:
        name: unattended-upgrades
        state: present
      tags: cis-level-1,packages

    - name: configure unattended-upgrades for security only
      copy:
        content: |
          Unattended-Upgrade::Allowed-Origins {
            "${distro_id}:${distro_codename}-security";
          };
          Unattended-Upgrade::AutoFixInterruptedDpkg "true";
          Unattended-Upgrade::Remove-Unused-Dependencies "true";
          Unattended-Upgrade::Automatic-Reboot "false";
        dest: /etc/apt/apt.conf.d/50unattended-upgrades
        owner: root
        group: root
        mode: '0644'
      tags: cis-level-1,packages
